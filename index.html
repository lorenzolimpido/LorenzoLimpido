<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="googlebot" content="noindex, nofollow" />
  <title>Caricamento…</title>
  <meta name="description" content="" id="meta-description" />
  <link rel="stylesheet" href="assets/css/fonts.css" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body aria-busy="true">
  <!-- HERO a tutto schermo -->
  <header class="hero" id="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="hero-logo-wrap">
        <img class="hero-logo" id="logo" alt="" />
        <span class="logo-caption" id="logo-caption"></span>
      </div>
      <p class="eyebrow" id="eyebrow"></p>
      <h1 class="name" id="name"></h1>
      <p class="tagline" id="tagline"></p>
    </div>
    <div class="hero-scroll" aria-hidden="true">scorri</div>
  </header>

  <!-- CONTENUTO -->
  <main class="container">
    <div class="grid">
      <!-- CARD PROFILO (sinistra) con foto tonda -->
      <article class="card profile">
        <img class="photo" id="photo" alt="" />
        <div class="profile-body">
          <h2 class="card-title" id="profile-title"></h2>
          <p class="intro" id="intro"></p>
          <div class="genres" id="genres" hidden>
            <span class="genres-label" id="genres-label">Generi</span>
            <ul class="genre-list" id="genre-list"></ul>
          </div>
          <div class="actions" id="actions"></div>
        </div>
      </article>

      <!-- BOX CONTATTI (destra) -->
      <aside class="card contact">
        <h2 class="card-title" id="contact-title"></h2>
        <p class="intro" id="contact-text"></p>
        <ul class="info" id="info"></ul>
        <nav class="links" id="links" aria-label="Social"></nav>
      </aside>
    </div>

    <!-- FOOTER box -->
    <footer class="card site-footer">
      <p class="footer-brand" id="footer-brand"></p>
      <p class="footer-lines" id="footer-lines"></p>
      <nav class="footer-legal" id="footer-legal" aria-label="Note legali"></nav>
      <p class="footer-copy" id="footer-copy"></p>
    </footer>
  </main>

  <script src="assets/js/main.js"></script>
</body>
</html>
